<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Order History</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Order History</h1>
    </header>
    <main>
        <section id="order-status">
            <h2>Order Status Tracking</h2>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Item</th>
                        <th>Quantity</th>
                        <th>Status</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Pizza</td>
                        <td>2</td>
                        <td>Delivered</td>
                        <td>2026-03-25</td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Burger</td>
                        <td>1</td>
                        <td>In Progress</td>
                        <td>2026-03-26</td>
                    </tr>
                    <!-- More orders can be dynamically inserted here -->
                </tbody>
            </table>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Food Ordering App</p>
    </footer>
</body>
</html>
