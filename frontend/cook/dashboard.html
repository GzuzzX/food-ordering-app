<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cook Statistics and Performance Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Cook Statistics and Performance Dashboard</h1>
    </header>
    <main>
        <section id="statistics">
            <h2>Current Statistics</h2>
            <div id="stats">
                <p>Total Dishes Prepared: <span id="total-dishes">0</span></p>
                <p>Average Preparation Time: <span id="avg-time">0</span> minutes</p>
                <p>Customer Satisfaction Rating: <span id="customer-satisfaction">N/A</span></p>
            </div>
        </section>
        <section id="performance">
            <h2>Performance Over Time</h2>
            <canvas id="performance-chart"></canvas>
        </section>
    </main>
    <footer>
        <p>Last Update: 2026-03-26 09:42:54 UTC</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
